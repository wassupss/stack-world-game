[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.run_command]
verify_jwt = false

[functions.raid_command]
verify_jwt = false

[functions.pvp_submit]
verify_jwt = false

[functions.market_trade]
verify_jwt = false

[functions.cleanup_daily]
verify_jwt = false

[functions.shop_command]
verify_jwt = false

[analytics]
enabled = false
